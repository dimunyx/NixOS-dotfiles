$font = Monocraft

general {
    	hide_cursor = false
}

animations {
    	enabled = true
    	bezier = linear, 1, 1, 0, 0
    	animation = fadeIn, 1, 5, linear
    	animation = fadeOut, 1, 5, linear
    	animation = inputFieldDots, 1, 2, linear
}

background {
    	monitor =
    	path = screenshot
    	blur_passes = 1
}

input-field {
    	monitor =
    	size = 20%, 5%
    	outline_thickness = 3
    	inner_color = rgba(0,0,0,0.0)
    	outer_color = rgb(181, 143, 255)
    	check_color = rgba(00ff99ee) rgba(ff6633ee) 120deg
    	fail_color = rgba(ff6633ee) rgba(ff0066ee) 40deg
    	font_color = rgb(232, 216, 255)
    	fade_on_empty = false
    	rounding = 16
    	font_family = $font
    	placeholder_text = Пароль ...
    	fail_text = Ошибка
    	check_text = Вход ...
    	dots_spacing = 0.3
    	position = 0, -20
    	halign = center
    	valign = center
}

label {
    	monitor =
    	text = $TIME
	font_size = 90
    	font_family = $font
    	position = -30, 0
    	halign = right
    	valign = top
}

label {
    	monitor =
    	text = cmd[update:60000] date +"%A, %d %B %Y"
    	font_size = 25
    	font_family = $font
    	position = -30, -150
    	halign = right
    	valign = top
}
