palette = "noctalia"
add_newline = false

format = """
$hostname$username$directory$git_branch
$cmd_duration$character"""

[character]
format = "[](bold fg:#B58FFF)"

[git_branch]
symbol = "󰘬"
format = "[](bold fg:#B58FFF)[$symbol $branch(:$remote_branch)](fg:#e8d8ff bg:#B58FFF)[](bold fg:#B58FFF)"

[git_commit]
commit_hash_length = 4
tag_symbol = "  "

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '
cherry_pick = "[🍒 PICKING](bold red)"

[git_status]
conflicted = " 🏳 "
ahead = " 🏎💨 "
behind = " 😰 "
diverged = " 😵 "
untracked = " 🤷 ‍"
stashed = " 📦 "
modified = " 📝 "
staged = '[++\($count\)](green)'
renamed = " ✍️ "
deleted = " 🗑 "

[hostname]
ssh_only = false
format =  "[](bold fg:#B58FFF)[$hostname](bg:#B58FFF bold fg:#e8d8ff)[@](bold bg:#B58FFF fg:#e8d8ff)"
trim_at = ".companyname.com"
disabled = false

[username]
format = "[](bold)[$user](bold fg:#e8d8ff bg:#B58FFF)[](bold fg:#B58FFF)"
disabled = false
show_always = true

[directory]
home_symbol = ""
read_only = ""
truncation_length = 2
truncation_symbol = ".../"
format = '[](bold fg:#B58FFF)[$path](bold fg:#e8d8ff bg:#B58FFF)[](bold fg:#B58FFF)'

[directory.substitutions]
"Рабочий стол" = ""
"Документы" = "󰈙"
"Загрузки" = ""
"Музыка" = ""
"Изображения" = ""
"Видео" = ""
"GitHub" = "󰊤"
"Игры" = ""
"Общедоступные" = "󰀃"
"Проекты" = "󰐯"
"Шаблоны" = ""
".config" = ""
".icons" = ""

[cmd_duration]
min_time = 0
format = '[](bold fg:#B58FFF)[ $duration](bold bg:#B58FFF fg:#e8d8ff)[](bold fg:#B58FFF)'


